# Server 인터페이스 계약 (docs/requirements.md)
# RTSP: rtsp://<server-ip>:8554/camera  (MediaMTX)
server.port=8080

# 애플리케이션 이름 (로그/배너 식별용)
spring.application.name=serverT

# --- 로깅 ---
# 실행 시 서버 상태가 콘솔에 보이도록 로그 레벨/패턴 설정
logging.level.root=INFO
logging.level.com.servert=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# --- 카메라 / 스트림 (요구사항 5장, FR-S-03/04) ---
# 로컬 웹캠/USB 카메라 사용. camera.device 는 dshow 장치명(비우면 GET /api/v1/stream/devices 로 조회).
camera.enabled=true
# dshow 장치명. 이 머신의 빌트인(내장) 카메라. 다른 PC 는 GET /api/v1/stream/devices 로 확인해 교체.
camera.device=Camera Sensor OV02C10
# ffmpeg 실행 경로. PATH 에 있으면 "ffmpeg"; IntelliJ 가 새 PATH 를 못 받는 경우 대비해 절대경로 지정.
camera.ffmpeg=C:/Users/chois/AppData/Local/Microsoft/WinGet/Packages/Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe/ffmpeg-8.1.2-full_build/bin/ffmpeg.exe
camera.default-resolution=1920x1080
camera.default-frame-rate=30

# 게시 대상(계약 고정: 8554/camera, NFR-I-01)
stream.rtsp-target=rtsp://localhost:8554/camera
# 스트림 자동 재접속 간격 (NFR-E-02: 3초)
stream.reconnect-interval-ms=3000

# --- MediaMTX (RTSP 서버) ---
mediamtx.autostart=true
mediamtx.exe=tools/mediamtx/mediamtx.exe
mediamtx.api-url=http://localhost:9997
